
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Live AI Grocery Scanner</title>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .upload-section { text-align: center; padding: 30px; border: 2px dashed #3498db; background: #ecf0f1; border-radius: 8px; margin-bottom: 25px; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 10px 20px; background: #3498db; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #preview { max-width: 200px; margin-top: 15px; display: none; border: 2px solid #ddd; border-radius: 5px; }
        .scan-btn { display: block; width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .scan-btn:hover { background: #27ae60; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media(max-width: 768px) { .results-grid { grid-template-columns: 1fr; } }
        .panel { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .total-row { font-weight: bold; background: #f1f2f6; }
        #loading { display: none; text-align: center; font-weight: bold; color: #e67e22; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧾 Universal Live AI Grocery Scanner & Translator</h1>

    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="billImage" accept="image/*" onchange="handleImage(this)">
            📁 Upload Any Real Grocery Bill
        </label>
        <br>
        <img id="preview" src="" alt="Bill Preview">
        <button class="scan-btn" id="processBtn" onclick="processLiveBill()">Scan Live Bill Now</button>
    </div>

    <div id="loading">⏳ Gemini AI is analyzing the receipt and translating dynamically... Please wait...</div>

    <div class="results-grid">
        <div class="panel">
            <h2>English Receipt</h2>
            <table>
                <thead><tr><th>Item Name</th><th>Quantity</th><th>Unit Price</th><th>Final Price</th></tr></thead>
                <tbody id="english-items"></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>தமிழ் ரசீது (Tamil)</h2>
            <table>
                <thead><tr><th>பொருளின் பெயர்</th><th>அளவு</th><th>விலை</th><th>மொத்தம்</th></tr></thead>
                <tbody id="tamil-items"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenAI } from "@google/generative-ai";

    // 🔑 PASTE YOUR COPIED GEMINI API KEY DIRECTLY INSIDE THE QUOTES BELOW:
    const API_KEY = "AQ.Ab8RN6I2Foa0JsNcdKmEZD3KkIVlQ3gWaOwNdecB6LlLoeOWbw";

    let base64ImageString = "";
    let imageMimeType = "image/jpeg";

    window.handleImage = function(input) {
        const file = input.files[0];
        if (!file) return;

        imageMimeType = file.type;
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'inline-block';

        const reader = new FileReader();
        reader.onloadend = function() {
            base64ImageString = reader.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    }

    window.processLiveBill = async function() {
        if (!base64ImageString) {
            alert("Please upload a grocery bill image first!");
            return;
        }
        if (API_KEY === "PASTE_YOUR_GEMINI_KEY_HERE") {
            alert("Please replace the text on line 71 with your actual Gemini API Key!");
            return;
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const ai = new GoogleGenAI({ apiKey: API_KEY });
            const model = ai.getGenerativeModel({ model: "gemini-1.5-flash" });

            const aiPrompt = `Look closely at this grocery bill image. Completely ignore company store names, addresses, cashiers, tax codes, payment methods, and receipt totals. Extract ONLY the true grocery items purchased. For each item, capture its name, quantity, and unit price. Translate the item name into spoken Tamil script. Calculate the final price as (quantity * price). Return ONLY a clean JSON object structure exactly matching this layout without markdown or backticks: 
            {"english": [{"item": "Name", "qty": 1, "price": 10.00, "final_price": 10.00}], "tamil": [{"item": "பெயர்", "qty": 1, "price": 10.00, "final_price": 10.00}], "english_grand_total": 10.00, "tamil_grand_total": 10.00}`;

            const imagePart = {
                inlineData: {
                    data: base64ImageString,
                    mimeType: imageMimeType
                },
            };

            const result = await model.generateContent([aiPrompt, imagePart]);
            const responseText = await result.response.text();
            
            let cleanJsonText = responseText.replace(/```json/g, "").replace(/```/g, "").trim();
            const parsedData = JSON.parse(cleanJsonText);
            
            renderTables(parsedData);
        } catch (error) {
            console.error(error);
            alert("AI scanning error. Please make sure the API key is correct and try again.");
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderTables(data) {
        const engBody = document.getElementById('english-items');
        const tamBody = document.getElementById('tamil-items');
        engBody.innerHTML = ""; tamBody.innerHTML = "";

        data.english.forEach(item => {
            engBody.innerHTML += `<tr><td>${item.item}</td><td>${item.qty}</td><td>${Number(item.price).toFixed(2)}</td><td>${Number(item.final_price).toFixed(2)}</td></tr>`;
        });
        engBody.innerHTML += `<tr class="total-row"><td colspan="3">Grand Total</td><td>${Number(data.english_grand_total).toFixed(2)}</td></tr>`;

        data.tamil.forEach(item => {
            tamBody.innerHTML += `<tr><td>${item.item}</td><td>${item.qty}</td><td>${Number(item.price).toFixed(2)}</td><td>${Number(item.final_price).toFixed(2)}</td></tr>`;
        });
        tamBody.innerHTML += `<tr class="total-row"><td colspan="3">மொத்தத் தொகை</td><td>${Number(data.tamil_grand_total).toFixed(2)}</td></tr>`;
    }
</script>
</body>
</html>
