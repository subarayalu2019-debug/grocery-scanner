<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live AI Grocery Bill Scanner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .api-setup-section { background: #e8f4fd; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #bee3f8; }
        .api-input-container { display: flex; gap: 10px; margin-top: 8px; }
        .api-input-container input { flex: 1; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; font-size: 14px; }
        .save-key-btn { padding: 10px 20px; background: #4a5568; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .save-key-btn:hover { background: #2d3748; }
        .upload-section { text-align: center; padding: 30px; border: 2px dashed #3498db; background: #ecf0f1; border-radius: 8px; margin-bottom: 25px; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 10px 20px; background: #3498db; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #preview { max-width: 250px; margin-top: 15px; display: none; border: 2px solid #ddd; border-radius: 5px; padding: 5px; background: white; }
        .scan-btn { display: block; width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .scan-btn:hover { background: #27ae60; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .panel { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .total-row { font-weight: bold; background: #f1f2f6; }
        #loading { display: none; text-align: center; font-weight: bold; color: #e67e22; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧾 Live AI Grocery Bill Scanner & Translator</h1>
    
    <div class="api-setup-section">
        <label><strong>🔑 STEP 1: Enter Google Gemini API Key:</strong></label>
        <div class="api-input-container">
            <input type="password" id="apiKey" placeholder="Paste your secret AIzaSy... key here">
            <button class="save-key-btn" onclick="saveKey()">Apply Key</button>
        </div>
    </div>

    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="billImage" accept="image/*" onchange="previewImage(this)">
            📁 STEP 2: Upload Real Grocery Bill
        </label>
        <br>
        <img id="preview" src="" alt="Bill Preview">
        <button class="scan-btn" id="processBtn" onclick="processBill()">STEP 3: Scan Live Bill Now</button>
    </div>

    <div id="loading">⏳ Reading your live bill and translating... Please wait...</div>

    <div class="results-grid">
        <div class="panel">
            <h2>English Receipt</h2>
            <table>
                <thead><tr><th>Item Name</th><th>Quantity</th><th>Unit Price</th><th>Final Price</th></tr></thead>
                <tbody id="english-items"></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>தமிழ் ரசீது</h2>
            <table>
                <thead><tr><th>பொருளின் பெயர்</th><th>அளவு</th><th>விலை</th><th>மொத்தம்</th></tr></thead>
                <tbody id="tamil-items"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let base64Image = "";
    let base64MimeType = "image/jpeg"; // Default fallback
    let activeApiKey = "";

    function saveKey() {
        const keyInput = document.getElementById('apiKey').value.trim();
        if (!keyInput) {
            alert("Please paste a key string into the input box first.");
            return;
        }
        activeApiKey = keyInput;
        alert("API Key configured successfully!");
    }

    function previewImage(input) {
        const file = input.files[0];
        if (!file) return;

        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'inline-block';

        const reader = new FileReader();
        reader.onloadend = function() {
            const sections = reader.result.split(',');
            base64Image = sections[1];
            // Match the exact image format uploaded (png, jpeg, etc.)
            const match = sections[0].match(/:(.*?);/);
            if (match) base64MimeType = match[1];
        }
        reader.readAsDataURL(file);
    }

    async function processBill() {
        if (!activeApiKey) {
            alert("Error: You must click 'Apply Key' in the API setup section first!");
            return;
        }
        if (!base64Image) {
            alert("Please upload a picture of a bill first!");
            return;
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        const prompt = `Analyze the uploaded grocery bill image. Extract all real items present. For each item, extract its true name, quantity, and unit price. Calculate final_price as (quantity * price). Translate item names to Tamil. Return ONLY a clean JSON object matching this structure exactly without backticks or markdown wrappers: {"english": [{"item": "string", "qty": number, "price": number, "final_price": number}], "tamil": [{"item": "string", "qty": number, "price": number, "final_price": number}], "english_grand_total": number, "tamil_grand_total": number}`;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeApiKey}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: base64MimeType, data: base64Image } }] }]
                })
            });

            const data = await response.json();
            
            // Check if Google sent an explicit server error block back
            if (data.error) {
                alert(`Google API Error: ${data.error.message} (${data.error.status})`);
                return;
            }

            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("Empty response channels received.");
            }

            let rawText = data.candidates[0].content.parts[0].text;
            rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
            
            const parsedData = JSON.parse(rawText);
            renderTables(parsedData);

        } catch (error) {
            console.error(error);
            alert("Processing error: Failed to translate data layout. Ensure image content is readable.");
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderTables(data) {
        const engBody = document.getElementById('english-items');
        const tamBody = document.getElementById('tamil-items');
        engBody.innerHTML = ""; tamBody.innerHTML = "";

        data.english.forEach(item => {
            engBody.innerHTML += `<tr><td>${item.item}</td><td>${item.qty}</td><td>${Number(item.price).toFixed(2)}</td><td>${Number(item.final_price).toFixed(2)}</td></tr>`;
        });
        engBody.innerHTML += `<tr class="total-row"><td colspan="3">Grand Total</td><td>${Number(data.english_grand_total).toFixed(2)}</td></tr>`;

        data.tamil.forEach(item => {
            tamBody.innerHTML += `<tr><td>${item.item}</td><td>${item.qty}</td><td>${Number(item.price).toFixed(2)}</td><td>${Number(item.final_price).toFixed(2)}</td></tr>`;
        });
        tamBody.innerHTML += `<tr class="total-row"><td colspan="3">மொத்தத் தொகை</td><td>${Number(data.tamil_grand_total).toFixed(2)}</td></tr>`;
    }
</script>
</body>
</html>
