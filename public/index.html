<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Live AI Grocery Scanner</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .upload-section { text-align: center; padding: 30px; border: 2px dashed #3498db; background: #ecf0f1; border-radius: 8px; margin-bottom: 25px; }
        input[type="file"] { display: none; }
        .custom-file-upload { display: inline-block; padding: 10px 20px; background: #3498db; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #preview { max-width: 200px; margin-top: 15px; display: none; border: 2px solid #ddd; border-radius: 5px; }
        .scan-btn { display: block; width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .scan-btn:hover { background: #27ae60; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        @media(max-width: 768px) { .results-grid { grid-template-columns: 1fr; } }
        .panel { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .total-row { font-weight: bold; background: #f1f2f6; }
        #loading { display: none; text-align: center; font-weight: bold; color: #e67e22; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧾 Universal Live AI Grocery Scanner & Translator</h1>

    <div class="upload-section">
        <label class="custom-file-upload">
            <input type="file" id="billImage" accept="image/*" onchange="handleImage(this)">
            📁 Upload Any Real Grocery Bill
        </label>
        <br>
        <img id="preview" src="" alt="Bill Preview">
        <button class="scan-btn" id="processBtn" onclick="processLiveBill()">Scan Live Bill Now</button>
    </div>

    <div id="loading">⏳ True AI is reading your receipt items and translating dynamically... Please wait...</div>

    <div class="results-grid">
        <div class="panel">
            <h2>English Receipt</h2>
            <table>
                <thead><tr><th>Item Name</th><th>Quantity</th><th>Unit Price</th><th>Final Price</th></tr></thead>
                <tbody id="english-items"></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>தமிழ் ரசீது (Tamil)</h2>
            <table>
                <thead><tr><th>பொருளின் பெயர்</th><th>அளவு</th><th>விலை</th><th>மொத்தம்</th></tr></thead>
                <tbody id="tamil-items"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let optimizedImageFile = null;

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;

        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'inline-block';

        // Automatically downscale image size so the free AI API never chokes
        const reader = new FileReader();
        reader.onload = function (e) {
            const img = new Image();
            img.onload = function () {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                // Max resize boundary rule
                const MAX_WIDTH = 800;
                if (width > MAX_WIDTH) {
                    height = Math.round((height * MAX_WIDTH) / width);
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Convert canvas data back to a small blob file object for Puter
                canvas.toBlob(function (blob) {
                    optimizedImageFile = new File([blob], "optimized_bill.jpg", { type: "image/jpeg" });
                }, 'image/jpeg', 0.7); // 70% compression quality setup
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function processLiveBill() {
        if (!optimizedImageFile) {
            alert("Please upload a grocery bill image first or wait a second for optimization!");
            return;
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const aiPrompt = `Look at this grocery bill. Completely ignore company names, store addresses, tax headers, payment methods, cashiers, and footer summaries. Extract ONLY the actual grocery products bought. For each product, find its true name, quantity, and unit price. Return ONLY a valid JSON string matching this structure exactly without markdown code blocks, triple backticks or the word json: {"products": [{"name": "Item Name", "qty": 1, "price": 4.50}]}`;
            
            const textResult = await puter.ai.txt2txt(aiPrompt, optimizedImageFile);
            
            // Clean up text text string layout filters
            let cleanJsonText = textResult.toString().replace(/```json/g, "").replace(/```/g, "").trim();
            
            // Safety parsing patch
            if (cleanJsonText.startsWith("json")) {
                cleanJsonText = cleanJsonText.substring(4).trim();
            }

            const parsedData = JSON.parse(cleanJsonText);
            await processItemsAndTranslate(parsedData.products);
        } catch (error) {
            console.error(error);
            alert("AI scanning error. Please make sure the photo is well-lit and crop out extra blank borders if it fails again.");
        } finally {
            loading.style.display = 'none';
        }
    }

    async function processItemsAndTranslate(products) {
        const engBody = document.getElementById('english-items');
        const tamBody = document.getElementById('tamil-items');
        engBody.innerHTML = ""; tamBody.innerHTML = "";

        let grandTotal = 0;

        for (let item of products) {
            let qty = Number(item.qty) || 1;
            let price = Number(item.price) || 0;
            let finalPrice = qty * price;
            grandTotal += finalPrice;

            engBody.innerHTML += `<tr>
                <td>${item.name}</td>
                <td>${qty}</td>
                <td>${price.toFixed(2)}</td>
                <td>${finalPrice.toFixed(2)}</td>
            </tr>`;

            let tamilName = "";
            try {
                const translationText = await puter.ai.txt2txt(`Translate this exact grocery item name to standard spoken Tamil script. Reply with ONLY the Tamil words, no English explanation: "${item.name}"`);
                tamilName = translationText.toString().trim();
            } catch(e) {
                tamilName = `பொருள் - ${item.name}`;
            }

            tamBody.innerHTML += `<tr>
                <td>${tamilName}</td>
                <td>${qty}</td>
                <td>${price.toFixed(2)}</td>
                <td>${finalPrice.toFixed(2)}</td>
            </tr>`;
        }

        engBody.innerHTML += `<tr class="total-row"><td colspan="3">Grand Total</td><td>${grandTotal.toFixed(2)}</td></tr>`;
        tamBody.innerHTML += `<tr class="total-row"><td colspan="3">மொத்தத் தொகை</td><td>${grandTotal.toFixed(2)}</td></tr>`;
    }
</script>
</body>
</html>
